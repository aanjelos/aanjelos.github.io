<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link href="./css/bootstrap.min.css" rel="stylesheet" />
  <link href="./css/style.css" rel="stylesheet" />
  <!--<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />-->

  <title>Aanjelo's link tree</title>
</head>

<body>

  <div class="container-fluid vh-100">
    <div class="row">
      <div class=logomargins>
        <div class="logorow"></div>
      </div>
    </div>
    <div class="row">
      <button class="dbabtn" onclick="window.location.href = 'doodlesbya/index.html';">
        <img src="img/dba_logo.png" class="logos"> Doodles by A
      </button>
    </div>
    <div class="row">
      <button class="spobtn" onclick="window.location.href = 'playlists.html';">
        <img src="img/spotify.png" class="logos"> Spotify Playlists
      </button>
    </div>
    <div class="row vh-20">
      <div class="col-6 col-md-6 nopad">
        <button class="fbbtn " onclick="window.location.href = 'https://www.facebook.com/aanjelo.s/';">
          <img src="img/fb.png" class="logos"> Facebook
      </button>
      </div>
      <div class="col-6 col-md-6 nopad">
        <button class="igbtn" onclick="window.location.href = 'https://www.instagram.com/aanjelo.s/';">
          <img src="img/ig.png" class="logos"> Instagram
        </button>
      </div>
    </div>
    <div class="row">
      <button class="extrabtn" onclick="window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';">
        <img src="img/think.png" class="logos"> Surprise Button
      </button>
    </div>
  </div>

  <script src="./js/jquery-3.6.0.min.js"></script>
  <script src="./js/bootstrap.min.js"></script>
  <!--<script src="./js/customjs.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>-->
</body>

</html>
